spring:
  application:
    name: NotificationService
  data:
    mongodb:
      uri: ${DB_URI_CONNECTION:mongodb://root:root@localhost:27017/notification-service-data?authSource=admin}
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: vn.van.notification_service.dto.event.NotificationEvent

server:
  port: 9003
  servlet:
    context-path: /notification

app:
  config:
    mail:
      api-key: ${BREVO_EMAIL_KEY}
      sender-email: ${BREVO_SENDER_EMAIL:todinhvan2608@gmail.com}
      sender-name: ${BREVO_SENDER_NAME:Van}