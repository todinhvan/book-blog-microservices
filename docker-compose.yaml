name: "book-blog-microservices"
services:
  mysql-server:
    image: mysql:8.0.44-debian
    container_name: identity-service-data
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: identity_data
    volumes:
      - identity_service_vol:/var/lib/mysql
    networks:
      - book_blog_nw
  neo4j-server:
    image: neo4j:2025.11.2-community
    container_name: profile-service-data
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/12345678
    volumes:
      - profile_service_vol:/data
    networks:
      - book_blog_nw
  sonarqube-service:
    image: sonarqube:25.12.0.117093-community
    container_name: sonarqube-service-statistics
    ports:
      - "8000:9000"
    networks:
      - book_blog_nw
  mongodb-server:
    image: mongo:8.2.3
    container_name: notification-service-data
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - notification_service_vol:/bitnami/mongodb
    networks:
      - book_blog_nw
  kafka-server:
    container_name: kafka-server
    image: bitnamilegacy/kafka
    ports:
      - 9092:9092 # internal Docker network listener (optionally)
      - 29092:29092 # external listener, host local connect
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://:9093,EXTERNAL://0.0.0.0:29092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@localhost:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,EXTERNAL://localhost:29092
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_vol:/bitnami/kafka
    networks:
      - book_blog_nw
  keycloak-service:
    image: quay.io/keycloak/keycloak:25.0.0
    container_name: keycloak-service-identity
    ports:
      - '8180:8080'
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    volumes:
      - keycloak_service_vol:/opt/keycloak/data
    networks:
      - book_blog_nw
  postgres-server:
    image: postgres:18
    container_name: spring-ai-service-data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: book-blog
      PGDATA: /var/lib/postgresql/custom_data
    ports:
      - '5432:5432'
    volumes:
      - spring_ai_service_vol:/var/lib/postgresql/custom_data
    networks:
      - book_blog_nw

volumes:
  identity_service_vol:
  profile_service_vol:
  notification_service_vol:
  kafka_vol:
  keycloak_service_vol:
  spring_ai_service_vol:

networks:
  book_blog_nw:
    driver: bridge