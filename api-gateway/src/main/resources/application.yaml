spring:
  application:
    name: ApiGateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: identity-service
              uri: http://localhost:9001
              predicates:
                - Path=${app.config.api-prefix}/identity/**
              filters:
                - StripPrefix=${app.config.strip-prefix}
            - id: profile-service
              uri: http://localhost:9002
              predicates:
                - Path=${app.config.api-prefix}/profiles/user/**
              filters:
                - StripPrefix=${app.config.strip-prefix}
            - id: notification-service
              uri: http://localhost:9003
              predicates:
                - Path=${app.config.api-prefix}/notification/**
              filters:
                - StripPrefix=${app.config.strip-prefix}

server:
  port: 9000

app:
  config:
    api-prefix: /api/v1
    strip-prefix: 2